  The **Standing Order**  sets out the basic rules for you and ${ other_party_in_case }  to follow during the case.  Violating this order can affect the outcome of your case.  The order states, unless ${ other_party_in_case } agrees or the court gives permission:
  
  % if user_need in('custody', 'answer custody') or (user_need in('divorce', 'answer divorce') and minor_children):
