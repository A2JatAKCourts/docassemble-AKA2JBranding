template: expect_reconsider_step
subject: |
  Step ${ expect_reconsider_idx }:
  What to expect after you file a Motion for Reconsideration 
content: |
  A **Motion for Reconsideration** is different from other motions.

    * ${ capitalize(other_party_in_case) } does not have to respond unless the judge sends a notice and asks ${ other_party_in_case } to respond in writing.
    * If the judge agrees to reconsider their decision, they may ask ${ other_party_in_case } to respond in writing, or they may change the decision. Usually, the judge only changes their  decision after they ask ${ other_party_in_case } for a written response.
    * If the judge does nothing for 30 days, it  means the judge is not going to grant your **Motion for Reconsideration**. You will not get anything in writing</a>. The original decision is not changed.
    * The 30 days start when  you file your **Motion for Reconsideration**.  If the judge asks ${ other_party_in_case } to respond in writing, the 30 days start over when ${ other_party_in_case } files their written response.

  Read the court's web page [Options after you get a judge's decision](https://ak-courts.info/afterjudgment).
---
