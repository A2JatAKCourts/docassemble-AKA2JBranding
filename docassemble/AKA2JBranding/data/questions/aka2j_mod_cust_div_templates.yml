template: register_order_step
subject: |
 Step ${ register_order_idx }:
 Register the out-of-state order
content: |
  <div class="step-subheading">Submit the following packet to the Alaska court</div>
  
    * 1 **certified** copy of the original order.
    * 1 **photocopy** of the certified original order.
    * **Case description form, CIV-125S** [[Fill in PDF](https://ak-courts.info/civ125s)]

  ${ signing_paragraph }
  
  <div class="step-subheading">For Custody</div> 
  
    * **Request to Register Child Custody Order of Another State or Country, DR-482** [[Fill in PDF](https://ak-courts.info/dr482)]
    * **Notice of Registration of Child Custody Order of Another State or Country, DR-483** [[Fill in PDF](https://ak-courts.info/dr483) <br>
  Completed except for the date and clerk's signature
  * **Request for Hearing on Registered Child Custody Order, DR-484**[[Fill in PDF](https://ak-courts.info/dr484)]<br>
  Only fill in the Petitioner's and Respondent's names in the caption at the top left. Leave the rest blank.
  
  <div class="step-subheading">For Child Support</div>
  
    * **Instructions - Registration of Support Order Issued by Another State, DR-341** [[Fill in PDF](https://ak-courts.info/dr341)]
  * **Petition to Register a Support Order from Another State, DR-342** [[Fill in PDF](https://ak-courts.info/dr341)]
  * **Confidential Information Sheet - Support Order from Another State, DR-343** [[Fill in PDF](https://ak-courts.info/dr343)]
  * **Notice of Registration of Another State's Support Order, DR-344** [[Fill in PDF](https://ak-courts.info/dr344)]<br>
  Completed except for the date and clerk's signature
  * **Request for Hearing About Registered Child Support Order, DR-345** [[Fill in PDF](https://ak-courts.info/dr345)]<br>
  Only fill in the Petitioner's and Respondent's names in the caption at the top left. Leave the rest blank.
  
  <div class="step-subheading">Tell the court how you want it to deliver the documents to the other parent.</div>
  The options are:
  
    * **1st class US mail** (which is free): <br>
  Give the clerk at the court:

      * the packet of forms to register a foreign order,
      * an envelope(s) addressed to the opposing party,
      * a copy of all documents you are filling **plus** a **Request for Hearing** form for the opposing party
  
  
    * **Certified mail** (which you have to pay for):

      * Before coming to court,
  
        * Go to the Post Office and get the forms for &quot;certified mail&quot;, &quot;restricted delivery&quot;, &quot;return receipt requested.&quot;
        * Figure out how much it will cost to mail the forms by this method, and
        * Put the stamps on the envelope. <br>
  If you do not provide the correct stamped envelope, your paperwork may be rejected.

  
    * Give the clerk at the court:

      * the packet of forms to register a foreign order,
      * an envelope(s) addressed to the opposing party, and
      * a copy of all documents you are filling **plus** a **Request for Hearing** form for the opposing party,
      * the filled-out mailing forms for certified mail, restricted delivery, return receipt requested from the Post Office for each of the people listed in the certificate of distribution on the **Notice of Registration Order**. <br>
  On the green card, fill out your return address so you get the green card back later.
      * enough postage for the court to serve by certified mail, restricted delivery, return receipt requested.

  
  * **Process server** (which you have to arrange and pay for):<br>  
  Give the clerk:
  
    * the packet of forms to register a foreign order,
    * service instructions for the specific process server you want the court to use. Read the instructions about &quot;Personal Service By Process Server&quot; in CIV-106.

  <div class="step-subheading">Pay the filing fee of $150 or ask the court to waive it</div>
  If you are registering **both** a foreign child custody order and a foreign support order together, or **only** a child custody order, the filing fee is $150.

  If you cannot afford $150, you can file a **Request for Exemption for Payment of Fees, TF-920**, [[Fill in PDF](https://ak-courts.info/tf920)]

  If you are registering **only** a foreign support order, it is **free**.</p>
---
