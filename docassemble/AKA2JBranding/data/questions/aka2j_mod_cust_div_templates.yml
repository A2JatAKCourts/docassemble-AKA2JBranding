template: foreign_order_step
subject: |
  Step ${ foreign_order_idx }:
  Ask the court to change your custody and Parenting Plan or child support order from another state
content: |
  If do not have to change your Parenting Plan or custody order and you only need to change your child support order, contact the [Alaska Child Support Enforcement Division (CSED)](https://childsupport.alaska.gov/child-support-services/contact-us). They may be able to help you change your order without going to court.
  <ul>
    <li>Customer Service Call Center:<br>    
    Monday - Thursday, 10:00 am - 3:00 pm
      <ul>
      <li>✆ Phone: (907) 269-6900,</li> 
      <li>Toll Free (In-state): 800-478-3300</li> 
      </ul></li>
  <li>⌨ Fax: (907) 787-3220</li>
  <li>Email: dor.cssd.customerservice.anchorage@alaska.gov</li> 
  </ul>
  <p>There are 3 steps to ask an Alaska court to change a custody and Parenting Plan or child support order from another state:</p>
  <ol>
  <li>Make sure the Alaska court has jurisdiction (authority) to change the order. See ${ ak_jurisdiction_step.subject }.</li>
  <li>Register the out-of-state order in Alaska. See ${ register_order_step.subject }.</li>
  <li>Ask the Alaska court to change the order by filing a Motion to Modify. See ${ modify_step.subject }.</li>
  </ol>
---
