template: case_in_2_states_step
subject: |
  Step ${ case_in_2_states_idx }: Options 
  % if type_of_response['default']:
  if ${ other_party_in_case } asked for default judgment 
  % endif
  when you have 
  % if stage_of_other_case == 'ended with order':
  a court order from another state
  % elif stage_of_other_case == 'still going':
  cases in 2 states
  % if type_of_response.any_true('improper service', 'default') and not proper_service:
   and you were not properly served
  % endif
  % endif
content: |
  % if type_of_response['default'] and stage_of_default in('application filed', 'hearing scheduled'):
  % if not proper_service:
  If ${ other_party_in_case } asked for a default judgment, it means they told the court they served you correctly. The judge may decide without hearing from you if you do not respond. 
  % else:
  If ${ other_party_in_case } asked for a default judgment, the judge may decide without hearing from you if you do not respond. 
  % endif
  You could end up with custody orders in 2 different states. To prevent this, you should tell the Alaska judge about the other case.
  % endif

  % if stage_of_other_case == 'still going':
  % if not type_of_response['default']:
    If you have an open ${ case_type } case in 2 states, one state will close its case.
  % endif
  You can (1) tell both judges you think your case should be in Alaska, or (2) ask the Alaska judge to dismiss your case so you can move forward in the other state.
  % if type_of_response.any_true('improper service', 'default') and not proper_service:
    You can also tell the Alaska judge you were not served correctly.
  % endif
  The judges will then decide which court has jurisdiction.
  See ${ expect_after_motion_or_answer_step.subject }.  
  % endif

  % if not type_of_response['default']:
    If you do not respond in Alaska, you risk the Alaska judge deciding the case without hearing from you. You could end up with custody orders in 2 different states.
  % endif

  % if type_of_response.any_true('improper service', 'default') and not proper_service:
    If you do not have a copy of the filed documents, you can ask ${ other_party_in_case } or get a copy from your file at the courthouse. Read about [getting copies of your court file](https://ak-courts.info/recordsrequest) on the court's website. If you are not sure you want to respond, you should [talk to a lawyer](https://ak-courts.info/findlawyer).
  % endif
  
  % if stage_of_other_case == 'still going':
  <div class="step-subheading">Option 1: Tell both judges you think your case should be in Alaska</div>
    1.	Fill out and file your Answer form. 
    <br>Tell the Alaska judge what you want to happen in your 
    ${ case_type } case.
    % if user_need == 'answer custody' or (user_need == 'answer divorce' and minor_children):
     Fill out the Counterclaim section with the Parenting Plan you want the judge to order.
    % endif
    Use section 5 to tell the judge:
  
      * There are 2 cases. And
  % if (user_need == 'answer custody' and jurisdiction) or user_need == 'answer divorce':
      * Why you think the case should move forward in Alaska. 
  % endif
  % if (user_need == 'answer custody' and not jurisdiction) or (user_need == 'answer divorce' and minor_children):
      * ${ "Or, why" if user_need == 'answer divorce' else "Why" } you think the Alaska court should hear the case even though your children have not lived in Alaska the last 6 months.
  % endif 
  % if (user_need == 'answer custody' and jurisdiction) or (user_need == 'answer divorce' and minor_children):
      * Include where your children have lived for the last 6 months. 
  % endif
  
  % if type_of_response.any_true('improper service', 'default') and not proper_service:
  In the Affirmative Defense section, you can write that you were not properly served. 
  % endif 
  
  See ${ answer_step.subject }.
  
  
    2.	Ask the other state court to close its case. Talk to a lawyer in the other state or try one of these nationwide directories:
  
      *	Legal Services Corporation's [Find Legal Aid tool](http://www.lsc.gov/find-legal-aid). Find free legal aid programs in your state for people with low incomes.
      * American Bar Association’s [ABA Free Legal Answers](https://www.abafreelegalanswers.org/)
      *	The ABA also offers a [Lawyer Referral Directory](https://americanbar.org/groups/lawyer_referral/resources/lawyer-referral-directory). Find dependable referrals to local for-fee lawyers if you do not qualify for free legal aid.
  
  <div class="step-subheading">Option 2: Ask the Alaska judge to dismiss your case so you can move forward in the other state</div>
  File a **Motion to Dismiss** in Alaska.

  Explain why you think the other court should hear the case ${", even though your children have lived in Alaska for the last 6 months." if user_need == 'answer custody' and jurisdiction else ""}${". Include where your children have lived for the last 6 months." if user_need == 'answer custody' and not jurisdiction else ""}.
  % if type_of_response.any_true('improper service', 'default') and not proper_service:
  You can also tell the judge you were not properly served. 
  % endif
  See ${ dismiss_step.subject }. 
  % endif
---
