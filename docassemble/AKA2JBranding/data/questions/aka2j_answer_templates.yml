template: want_help_to_agree_step
subject: |
  Step ${ want_help_to_agree_idx }:
  % if user_need == 'answer divorce' and type_of_response['stay married']:
  You cannot stop your spouse from getting a ${ case_type }
  % elif user_need == 'answer divorce' and type_of_response.all_false():
  Options if ${other_party_in_case} wants to talk about ending a marriage
  % endif
  % if user_need == 'answer custody' and type_of_response.all_false():
  Options if ${other_party_in_case} wants to talk about a Parenting Plan and starting a custody case
  % endif
  % if (user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive = True) or type_of_response.all_true('ak custody case', 'improper service', exclusive = True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive = True))):
  % if response_to_complaint == 'agree':
  Review your options when you agree with what ${other_party_in_case} is asking
  % elif response_to_complaint == 'some':
  Review your options when you agree with some of what ${other_party_in_case} is asking
  % elif response_to_complaint == 'none' and want_help_to_agree:
  Decide if you want to try to reach an agreement with ${other_party_in_case}. Resources to help you reach an agreement with ${other_party_in_case}  
  % endif
  % endif
content: |
  % if user_need == 'answer custody' and type_of_response.all_false(): # region content.answer_custody_all_false
  One parent cannot stop ${ other_party_in_case } from starting a ${ case_type } case to get a court order about the Parenting Plan. If either parent asks, the court will issue a Parenting Plan, custody, and child support order. 
  % if type_of_response.all_false('default'):
  If there is going to be a ${ case_type } case, there are benefits to reaching an agreement.
  % endif
  % endif # endregion content.answer_custody_all_false  
  % if user_need == 'answer divorce' and (type_of_response.all_false() or type_of_response['stay married']): # region content.answer_divorce_all_false_or_stay_married
  One spouse cannot stop the other spouse from starting a case to end your marriage. 
  
  If either spouse tells the court the marriage has broken down and cannot be saved, the court will grant a
  % if type_of_response.all_false(): ## region content.grants_a___sentence
  divorce or legal separation.
  % else:
  ${ case_type }.
  % endif ## endregion content.grants_a___sentence
  
  % if type_of_response.all_true('stay married', exclusive = True): ## region content.parenting_plan_sentences
  If you and your spouse have children together and the children are under 18, the court will also issue a Parenting Plan, custody, and child support order.
  % else:
  % if minor_children:
  The court will also issue a Parenting Plan, custody, and child support order.
  % endif 
  % endif # endregion content.parenting_plan_sentences
  % if type_of_response.all_false('default'):
  If the marriage is going to end, there are benefits to reaching an agreement.
  % endif
  % endif ## endregion content.answer_divorce_all_false_or_stay_married

  
  % if (user_need in('answer custody', 'answer divorce') and type_of_response.any_true()): # region content.answer_custody_or_divorce_any_true_deadline
  % if user_need == 'answer divorce' and ((type_of_response.all_true('ak divorce case', 'stay married', exclusive = True) or (type_of_response.all_true('stay married', exclusive = True) and respond) or type_of_response.all_true('ak divorce case', 'improper service', 'stay married', exclusive = True) or ((type_of_response.all_true('ak divorce case', 'stay married', 'case in 2 states',  exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', 'stay married', 'case in 2 states',  exclusive = True)) and stage_of_other_case == 'ended with no order')) and (response_to_complaint in ('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree))): # region content.answer_divorce_complex_deadline_sentence 
  You **must respond and file your Answer within 20 days** of getting the Complaint, even if you are trying to work out an agreement with ${other_party_in_case}. 
  % else:
  You **must respond and file your Answer ${"or Motion to Dismiss " if type_of_response['case in 2 states'] and stage_of_other_case == 'still going' else ""}within 20 days** of getting the Complaint.
  % endif # endregion content.answer_divorce_complex_deadline_sentence
  
  % if not (type_of_response['default'] and stage_of_default == 'judgment entered'):
  If you miss the 20-day deadline, the court may enter a default judgment against you. A default judgment is when the judge decides your case without hearing from you.
  % endif
  % endif # endregion content.answer_custody_or_divorce_any_true_deadline
  
  % if user_need == 'answer divorce' and ((type_of_response.all_true('ak divorce case', 'stay married', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', 'stay married', exclusive = True) or (type_of_response.all_true('stay married', exclusive = True) and respond)) or (((type_of_response.all_true('ak divorce case', 'stay married', 'case in 2 states', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', 'stay married', 'case in 2 states', exclusive = True) or type_of_response.all_true('case in 2 states', 'stay married', exclusive = True)) and stage_of_other_case == 'ended without order'))): # region content.stay_married_complaint_response_subheadings
  % if response_to_complaint == 'agree': # region content.review_options_by_response_to_complaint_2
  <div class = "step-subheading">Review your options when you agree with what ${other_party_in_case} is asking</div>
  % elif response_to_complaint == 'some':
  <div class = "step-subheading">Review your options when you agree with some of what ${other_party_in_case} is asking</div>
  % elif response_to_complaint == 'none' and want_help_to_agree:
  <div class = "step-subheading">Decide if you want to try to reach an agreement with ${other_party_in_case}</div>
  If you and ${other_party_in_case} reach an agreement about the issues in the case, you can avoid a trial.
  
  % endif # endregion content.review_options_by_response_to_complaint_2
  % endif # endregion content.stay_married_complaint_response_subheadings


  % if (user_need == 'answer custody' and type_of_response['ak custody case']) or (user_need == 'answer divorce' and type_of_response.all_false('wrong state', 'default') and not (type_of_response['case in 2 states'] and stage_of_other_case in ('still going', 'ended with order')) and (type_of_response['ak divorce case'] or (type_of_response.all_true('stay married', exclusive = True) and respond))) or (user_need in('answer custody','answer divorce') and type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'): # region content.response_to_complaint_agree_or_some_block
  % if case_type in('custody', 'divorce') or (case_type == 'legal separation' and want_legal_separation == 'yes'): # region content.case_type
  
  % if response_to_complaint in ('agree', 'some'): # region content.response_to_complaint_is_agree_or_some
  % if response_to_complaint == 'agree':
    If you agree with everything ${other_party_in_case} asked for in the Complaint:
    <ul>
    <li>State that you agree in your Answer.</li>
    <li>Decide if you want to write out an agreement with ${other_party_in_case}.</li>
  % elif response_to_complaint == 'some':
    If you agree with some of what ${other_party_in_case} asked for in the Complaint:
    <ul>
    <li>State what you agree with in your Answer.</li>
    <li>Decide if you want to try to work with ${other_party_in_case} to write out your agreement.</li>
  % endif
  </ul>
  <div class = "step-subheading">Review the benefits of reaching an agreement</div>  
  If you and ${other_party_in_case} agree about the issues in the case, you can avoid a trial.
  % endif # endregion content.response_to_complaint_is_agree_or_some
  % endif # endregion content.case_type
  % endif # endregion content.response_to_complaint_agree_or_some_block

  
  % if type_of_response.all_false() or ((type_of_response.all_true('ak custody case', exclusive = True) or type_of_response.all_true('ak custody case', 'improper service', exclusive = True) or type_of_response.all_true('ak divorce case', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive = True) or type_of_response.all_true('ak divorce case', 'stay married', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', 'stay married', exclusive = True) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order')) and (case_type in ('custody', 'divorce') or (case_type == 'legal separation' and want_legal_separation == 'yes')) and response_to_complaint == 'none' and want_help_to_agree):
  <div class = "step-subheading">The benefits of reaching an agreement</div>
  If you and ${other_party_in_case} reach an agreement about the issues in the case, you can avoid a trial.
  % endif


  
  % if type_of_response.all_false('wrong state', 'default') and not (type_of_response['case in 2 states'] and stage_of_other_case in ('still going', 'ended with order')) and not (user_need == 'answer divorce' and ((type_of_response.all_true('stay married', exclusive = True) and not respond) or (type_of_response['stay married'] and response_to_complaint == 'none' and not want_help_to_agree))): # region content.some_benefits_are
  
  **Some benefits are:**

  
  % if (user_need == 'answer custody' and type_of_response['ak custody case']) or (user_need == 'answer divorce' and type_of_response['ak divorce case'] and (minor_children or (not minor_children and wife_is_pregnant in('husband', 'not husband')))) or (type_of_response.all_false() and want_help_to_agree) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'): # region content.parenting_plan_bullet_1 
    * Working out the Parenting Plan instead of fighting is better for the children.
  % endif # endregion content.parenting_plan_bullet_1
    * You decide the outcome rather than a judge - you know more about the issues in your case than the judge ever will.  
    * Reaching an agreement may be more cooperative than dealing with the issues in a trial, where each ${ 'parent' if user_need == 'answer custody' else 'spouse' } presents evidence and makes arguments about what they want the judge to decide.
    * Reaching an agreement outside of court can save time and money, and provide more privacy and confidentiality.


  <div class = "step-subheading">Watch a video about reaching an agreement</div>
    Watch a [short video that discusses resolving your case](https://www.youtube.com/watch?v=4EuW9HET3nM&list=PLRS0LlEIQsuTsfO0wSTsSTIvVE5RO8sLc&index=7&t=3s) by reaching agreement with ${ other_party_in_case }.


  
   % if (user_need == 'answer custody' and type_of_response['ak custody case'] and case_type == 'custody') or (user_need == 'answer divorce' and type_of_response['ak divorce case'] and (case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes'))) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order') or type_of_response.all_false(): # region content.options_for_working_with_other_party
  
  % if type_of_response.all_false() or (type_of_response.any_true() and response_to_complaint == 'agree'): # region content.options_title_write_out_vs_reach
  <div class='step-subheading'>Options for working with ${ other_party_in_case } to write out your agreement</div>
  % else:
  <div class='step-subheading'>Options for working with ${ other_party_in_case } to reach an agreement</div>
  % endif # endregion content.options_title_write_out_vs_reach
  * Talk to ${ other_party_in_case } about settling the case without a trial
  * Mediation
  % if user_need in('answer custody', 'answer divorce') and type_of_response.any_true(): # region content.settlement_conference_bullet
  * Settlement Conference
  % endif # endregion content.settlement_conference_bullet
  * Collaborative Law
  % endif # endregion content.options_for_working_with_other_party
 
  
  <div class='step-subheading'>Talk to ${other_party_in_case} about settling the case without a trial</div>
  
  % if user_need == 'answer custody': # region content.talk_to_other_party_paragraph_by_user_need
  Some parents want to work out the issues by agreement without the judge deciding and are able to talk to each other in person, on-line, or with the help of a friend or family member.
  % elif user_need == 'answer divorce':
  Some spouses want to work out the issues by agreement without the judge deciding and are able to talk to each other in person, on-line, or with the help of a friend or family member.
  % endif # endregion content.talk_to_other_party_paragraph_by_user_need
  <div class='step-subheading'>Mediation</div>
  Mediation is a voluntary and confidential way to resolve disagreements. No one else, like a judge or the mediator, decides for you. A neutral person, called the mediator, helps people outside the court process:
  
  * Figure out the important issues in the disagreement.
  * Explain and understand each other's needs.
  * Clear up misunderstandings.
  * Explore creative solutions. And
  * Reach acceptable agreements.

  
  % if type_of_response.any_true() and (user_need == 'answer custody' or (user_need == 'answer divorce' and minor_children)): # region content.alaska_courts_mediation_paragraph
  Alaska courts offer mediation in cases in which parents need to create a Parenting Plan. The mediator helps parents resolve disputes about access and visitation concerns and create workable co-Parenting Plans. There is no fee for this service unless parents wish to mediate additional issues or require more time than allowed by program.
  
  The form, **Request for Court-Sponsored Parenting Plan Dispute Resolution, MED-405** [[Fill in PDF](https://ak-courts.info/med405)], may be used to request mediation.
  % endif # endregion content.alaska_courts_mediation_paragraph


  You can hire your own private mediator to help resolve any issue in your case. If there was abuse or domestic violence in your relationship, be sure to hire someone with training and experience working with domestic violence. Tell your mediator if you want to bring a support person with you.
  
  [Read about mediation](https://courts.alaska.gov/mediation).
  
  [Find a private mediator](https://pmoa.wildapricot.org/directory) on the Professional Mediators of Alaska website. 
  
  % if user_need in ('answer custody', 'answer divorce') and type_of_response.any_true(): # region content.settlement_conference_section
  <div class='step-subheading'>Settlement Conference</div>
  A settlement conference is a meeting with a judge before trial to explore ways to settle your issues.
  
  * The meeting includes you, ${other_party_in_case}, your lawyers, if you have them, and a judge.
  * The judge may or may not be the same judge you will have if you go to trial.
  * The judge's role is to try to help you reach an agreement, not to be a decision-maker.
  * Each side makes offers about what they want and the judge comments on whether it meets the legal requirements and is reasonable.
  * The judge has no official power to make the parties settle at this stage, but usually strongly encourages settlement by critiquing the parties' trial positions.
  * The judge also indicates how a judge would likely rule on disputed issues during the trial.
  * If both parties want a judge to help settle the issues, file a **Joint Motion for a Settlement Conference, SHC 1062** [Word](http://www.courts.alaska.gov/shc/family/docs/shc-1062.doc) | [PDF](http://www.courts.alaska.gov/shc/family/docs/shc-1062n.pdf).
  % endif # endregion content.settlement_conference_section
  
  <div class='step-subheading'>Collaborative Law</div>
  The Alaska Association of Collaborative Professionals helps people resolve
  % if user_need in('divorce', 'answer divorce', 'change divorce order'): # region content.collaborative_law_divorce_vs_parenting_words
  divorce
  % if minor_children: # region content.collaborative_law_minor_children_words
  divorce and parenting
  % endif # endregion content.collaborative_law_minor_children_words
  % elif user_need in('custody', 'answer custody', 'change custody order order'):
  parenting
  % endif # endregion content.collaborative_law_divorce_vs_parenting_words
  issues themselves. 
  
  The judge does not get involved in making the decisions. Learn more about the Association on [their website](https://www.alaskacollaborative.org).
   
  % if (user_need == 'answer custody' and type_of_response.all_false() and not agreement_documents) or (user_need == 'answer divorce' and type_of_response.all_false()): # region content.what_to_do_if_you_reach_agreement
  <div class = "step-subheading">What to do if you reach an agreement</div>
  Use the Court Guide Action Plan: 
  % if user_need == 'answer custody': # region content.action_plan_link_by_user_need
  [Starting a Custody Case](https://docassemble.akcourts.gov/start/AskingForChildCustody).
  % elif user_need == 'answer divorce':
  [Starting a Case to End Your Marriage](https://docassemble.akcourts.gov/start/DivorceAndSeparation/). 
  % endif # endregion content.action_plan_link_by_user_need
  % endif # endregion content.what_to_do_if_you_reach_agreement
  % endif # endregion content.some_benefits_are
---
comment: |
  last updated 2026-05-01 added gateway user_need == 'answer divorce'  for minor_children in subject - do not need to update docx.
  2026-04-09 changed conditions so case_type is not asked if type_of_response.all_false()
  last updated 2026-04-02 switch the order of respond to complaint to be inside children or no children in 2nd half of template.
  2026-02-18 heading to reflect no agreement, no help wanted and no kids, not pregnant
  2025-08-25 to take out agreeing with complaint in custody language in any circumstance where akcustody is not the only choice
  compare this step with AKA2J domestic_violence_step  headings and content.
  [Comparing domestic violence in answering divorce google sheet](https://docs.google.com/spreadsheets/d/1AUnHuheq_VsuTufg75G9cM5TGnd3OAa7-jd-RzIwnA4/edit?usp=sharing), tab for asking cust div and 
template: answer_domestic_violence_step
subject: |
  Step ${ answer_domestic_violence_idx }:
  % if type_of_response.all_false() or (((user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive = True) or type_of_response.all_true('ak custody case', 'improper service', exclusive=True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive=True)) and (case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')))) and (response_to_complaint in ('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree))):
  Abuse or domestic violence resources and reaching an agreement
  % else: 
  Abuse or domestic violence ${ 'resources' if user_need == 'answer divorce' and not minor_children and wife_is_pregnant == 'not pregnant' else 'and parenting' } 
  % endif 
content: |
  <div class="step-subheading">If you are in immediate danger, call 911</div>

  % if user_need == 'custody':
  People who have experienced domestic violence can be at greater risk when they start a court case.
  % elif user_need == 'divorce':
  People who have experienced domestic violence can be at greater risk when they separate from their spouse or start a court case to end their marriage.
  % elif user_need in('answer custody', 'answer divorce'):
  People who have experienced domestic violence can be at risk during a court case.
  % endif
   During this time, safety is very important. 
  
  The dynamics in a relationship with domestic violence may also cause people to feel pressured to agree to something they do not want. If this is your situation, these resources may help:
  
    * [Find a domestic violence program in your area](https://andvsa.org/communitys-programs) to learn about the services they offer, like counseling, financial assistance, housing and safe shelter, 
  % if user_need in('custody', 'answer custody') or (user_need in('divorce', 'answer divorce') and minor_children):
  resources for children, 
  % endif
  and help with court.
    * You can get information about asking the court for a protective order by answering more questions. See the Court Guide Action Plan: [Protective Orders](https://docassemble.akcourts.gov/start/ProtectiveOrders).
    * See if you qualify for [legal assistance through your local domestic violence program](https://www.andvsa.org/for-survivors/) or [Alaska Legal Services Corporation](https://www.alsc-law.org/apply-for-services).
  
  % if ((user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive=True) or type_of_response.all_true('ak custody case', 'improper service', exclusive=True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive=True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive=True)) and (case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')))) and (response_to_complaint in ('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree)):
  
  % if user_need == 'answer custody':
  However, some parents in a relationship that includes domestic violence are comfortable reaching an agreement about a Parenting Plan for a variety of reasons.
    
  Sometimes, domestic violence does not make either parent uncomfortable or afraid to ask for what they want in the Parenting Plan.
  
  If the domestic violence does make a parent uncomfortable or afraid, provisions are used to make the process of trying to reach an agreement feel safer (having a support person present, having a mediator or a trusted third person help with discussions, not meeting in-person, meeting in different rooms, or talking about an agreement through email, text or telephone).
    
  Sometimes, one parent's main goal is to finish the case and be done in a safe manner so they are willing to give up some things in the agreement that they may be entitled to under the law.

  % elif user_need == 'answer divorce':
  However, some people in a marriage with domestic violence are comfortable reaching an agreement about 
  % if minor_children or (not minor_children and wife_is_pregnant in('husband','not husband')):
  a Parenting Plan and 
  % endif 
  dividing marital property and debt for a variety of reasons.
  
  Sometimes, domestic violence does not make either spouse uncomfortable or afraid to ask for what they want in the ${ "Parenting Plan or " if minor_children else "" }property & debt division.
  
  If the domestic violence does make a spouse uncomfortable or afraid, provisions are used to make the process of trying to reach an agreement feel safer (having a support person present, having a mediator or a trusted third person help with discussions, not meeting in-person, meeting in different rooms, or talking about an agreement through email, text or telephone).
  
  Sometimes, one spouse's main goal is to finish the case and be done in a safe manner so they are willing to give up some things in the agreement that they may be entitled to under the law.
  % endif 
  
  You can decide if you are comfortable trying to reach an agreement with ${ other_party_in_case } based on the facts and circumstances of your case.
  % endif 
  % if user_need in('custody', 'answer custody') or (user_need in('divorce', 'answer divorce') and minor_children or (not minor_children and wife_is_pregnant in('husband','not husband'))):
  % if ((user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive=True) or type_of_response.all_true('ak custody case', 'improper service', exclusive=True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive=True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive=True)) and (case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')))) and (response_to_complaint in ('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree)) or (user_need in ('answer custody', 'answer divorce') and type_of_response.all_false()):
  If you want to try to reach an agreement about the Parenting Plan, your options may be limited if there has been domestic violence.

  <div class='step-subheading'>Your Parenting Plan agreement may be limited if there is domestic violence</div>
  % else:
  <div class='step-subheading'>How domestic violence affects a ${case_type} case</div>
  % endif

  The law presumes that a parent with a "history of domestic violence" not get custody or unsupervised visitation unless they meet certain requirements. These may include completing a batterer's intervention or substance abuse treatment program.
  
  A "history of domestic violence" is defined by the law as either one incident of domestic violence that caused serious physical injury, or more than one incident. The parent's domestic violence behavior needs to fit under one of the domestic violence crimes in the law. There does not have to be a protective order or criminal case for the court to find a parent has a history of domestic violence. The court can find domestic violence based on one parent's testimony.
  
  % if (((user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive = True) or type_of_response.all_true('ak custody case', 'improper service', exclusive = True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive = True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive = True)) and (case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')))) and (response_to_complaint in('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree))):
  <div class='step-subheading'>Considerations if you and ${ other_party_in_case } cannot agree</div>
  % else:
  <div class='step-subheading'>Contact between parent and children</div>
  % endif

  If you think ${ other_party_in_case } should not have any contact with your children, you need to convince the judge that it is in the children's best interest. 
  
  Generally, it is unusual for a judge in a ${ "custody" if user_need in('custody', 'answer custody') else "divorce or legal separation" } case to decide that a parent cannot see their children. Research shows it is important for children to have a relationship with both parents, if it can happen in a safe manner. 
  
  If the judge finds the domestic violence presumption applies, the judge will usually permit supervised contact between the parent and the children while the parent is completing a batterer's intervention or substance abuse treatment program. After the parent finishes the program and any other requirements the judge ordered, the judge may lift the supervision restriction and allow a different parenting schedule.
  
  % if ((user_need == 'answer custody' and (type_of_response.all_true('ak custody case', exclusive=True) or type_of_response.all_true('ak custody case', 'improper service', exclusive=True))) or (user_need == 'answer divorce' and (type_of_response.all_true('ak divorce case', exclusive=True) or type_of_response.all_true('ak divorce case', 'improper service', exclusive=True)) and (case_type == 'divorce' or (case_type == 'legal separation' and want_legal_separation == 'yes')))) and (response_to_complaint in ('agree', 'some') or (response_to_complaint == 'none' and want_help_to_agree)):
  <div class="step-subheading">Tell the judge your concerns</div>
  % endif 
  The judge will only know about your domestic violence concerns if you state them in the documents you file and when you talk in court. If you have concerns for the children's safety when in the care of ${ other_party_in_case }, or for yourself when interacting with ${ other_party_in_case }, describe them to the judge. If the judge is going to allow ${ other_party_in_case } to have parenting time (visitation) with the children, you can suggest ways to address your concerns. Some options include:
  
    * no drugs or alcohol prior to or during the visits,
    * drug or alcohol testing and/or treatment,
    * no overnight visitation,
    * no excessive discipline or spanking,
    * no emotional abuse such as cursing at or name calling,
    * no saying anything bad about you to or in front the children or letting anyone else do it,
    * no inappropriate exposure to adult activities such as pornography,
    * exchanges only at public or specified places,
    * supervised exchanges by a willing and available third party who you trust,
    * parenting time only occur in a public or specified place,
    * supervised parenting time with a willing and available third party who you trust, or
    * no contact between the children and specific individuals you are concerned about.
  
  If you think you or your children's health, safety, or liberty would be harmed by providing the information on the **Child Custody Jurisdiction Affidavit, DR-150** to ${ other_party_in_case }:
  
    * Do not give ${ other_party_in_case } a copy of the completed **Child Custody Jurisdiction Affidavit** after you file it with the court. and
    * File  **Direction to Seal Child Custody Jurisdiction Affidavit**, [DR-151](https://public.courts.alaska.gov/web/forms/docs/dr-151.pdf).
  % endif
