template: dismiss_step
subject: |
  Step ${ dismiss_idx }:
  % if type_of_response['wrong state'] and (user_need == 'answer divorce' or (user_need == 'answer custody' and not type_of_response['default'] and not jurisdiction)):
  If you think Alaska is the wrong state, file a motion to dismiss your Alaska case
  % elif type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  File a motion to dismiss your Alaska case
  % elif type_of_response['case in 2 states'] and stage_of_other_case == 'still going':
  If you decide to move forward in the other state, file a motion to dismiss your Alaska case
  % else:
  % if (type_of_response['wrong state'] or (type_of_response.all_true('case in 2 states', 'default') and stage_of_default in('application filed', 'hearing scheduled') and stage_of_other_case == 'still going')) and (user_need == 'answer custody' and not jurisdiction):
  Fill out the forms to respond and tell the court Alaska is the wrong state
  % endif
  % if (type_of_response.all_true('default', exclusive = True) or type_of_response.all_true('default', 'stay married', exclusive = True) or (type_of_response['default'] and type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order') or (type_of_response['default'] and type_of_response['wrong state'] and user_need == 'answer custody' and jurisdiction)) and not proper_service and stage_of_default in('application filed', 'hearing scheduled'):
  Or, tell the judge you were not served the correct way and ask to dismiss the case
  % endif
  % endif
content: |
  % if type_of_response['case in 2 states'] and stage_of_other_case == 'ended with order':
  % if type_of_response['default'] or (type_of_response['improper service'] and not proper_service):
  Your situation is complicated. You may want to [talk to a lawyer](https://ak-courts.info/findlawyer). If you do not respond to the Alaska case, the Alaska judge may enter a ${ case_type } order. This could be very complicated if you already have a ${ case_type } order in another state. It is best to file a **Motion to Dismiss** your Alaska case to tell the Alaska judge 
  % if proper_service:
    about the order from the other state.
  % else:
    (1) about the order from the other state and (2) that you were not served properly.
  % endif
  % else:
  If the case in the other state is over and the other court issued final orders, you can file a **Motion to Dismiss** your Alaska case.
  % endif
  
  File a copy of the final orders from the other state, and any other documents that support your request.
  % endif

  % if (type_of_response['improper service'] and not proper_service) or type_of_response['default']:
  If you do not have a copy of the filed documents, you can ask ${ other_party_in_case } or get a copy from your file at the courthouse. Read about [getting copies of your court file](https://ak-courts.info/recordsrequest) on the court's website. 
  % endif

  % if type_of_response['default']:
  % if type_of_response['wrong state'] and ((user_need == 'answer custody' and not jurisdiction) or user_need == 'answer divorce'):
      If the Alaska Court does not have jurisdiction and you want the court to dismiss the case, you can fill out and file a **Motion to Dismiss** that tells the court why you want to dismiss the case.
   % elif type_of_response['case in 2 states'] and stage_of_other_case == 'still going' and ((user_need == 'answer custody' and not jurisdiction) or user_need == 'answer divorce'):
  If ${ other_party_in_case } asked for a default judgment, the judge may decide without hearing from you if you do not respond. You could end up with 2 different ${ "custody " if user_need == 'answer custody' else "" }orders from 2 different states. To prevent this, file a **Motion to Dismiss** to tell the Alaska judge${ ": (1)" if user_need == 'answer custody' else "" }${ ": (1)" if user_need == 'answer divorce' and minor_children else "" }${ ": (1)" if user_need == 'answer divorce' and not minor_children and wife_is_pregnant in ('husband', 'not husband') else "" }${ ": (1)" if user_need == 'answer divorce' and not minor_children and wife_is_pregnant == 'not pregnant' and not proper_service else "" } about the other case${ ", and (2) your children have not lived in Alaska for the last 6 months." if user_need == 'answer custody' and proper_service else "" }${ ", and (2) your children have not lived in Alaska for the last 6 months." if user_need == 'answer divorce' and minor_children and proper_service else "" }${ ", and (2) your children have not lived in Alaska for the last 6 months." if user_need == 'answer divorce' and not minor_children and wife_is_pregnant in ('husband', 'not husband') and proper_service else "" }${ ", (2) your children have not lived in Alaska for the last 6 months, and (3) that you weren't served properly." if user_need == 'answer custody' and not proper_service else "" }${ ", (2) your children have not lived in Alaska for the last 6 months, and (3) that you weren't served properly." if user_need == 'answer divorce' and minor_children and not proper_service else "" }${ ", (2) your children have not lived in Alaska for the last 6 months, and (3) that you weren't served properly." if user_need == 'answer divorce' and not minor_children and wife_is_pregnant in ('husband', 'not husband') and not proper_service else "" }${ ", and (2) that you were not served properly." if user_need == 'answer divorce' and not minor_children and wife_is_pregnant == 'not pregnant' and not proper_service else "" }${ "." if user_need == 'answer divorce' and not minor_children and wife_is_pregnant == 'not pregnant' and proper_service else "" }
    
  Tell the judge in the **other** state about the Alaska case.  
  % endif

  % if type_of_response.all_false('wrong state', 'case in 2 states') and not proper_service:
  If you think you were not served the correct way and you want the court to dismiss the case, you can fill out and file a Motion to Dismiss that tells the court why you think you were not served in the correct way.
  % endif
  
  Because ${ other_party_in_case } asked for a default judgment, it is important to file your motion as soon as possible to prevent the judge from entering a default judgment order.
  % endif
  
  If you choose to ask the judge to dismiss your case, use **Motion (Request) and Affidavit, TF-706** [[Fill in PDF](https://ak-courts.info/tf706)]. Tell the judge why
  % if type_of_response.any_true('wrong state', 'case in 2 states'):
  you think the court does not have jurisdiction and any other reason
  % endif
  you think the case should be dismissed.

  ${ signing_paragraph }
  
  <div class="step-subheading">Learn more</div>

  Watch: [Motions Part 1: How to Ask the Court For Something](https://www.youtube.com/watch?v=2irmxT0_0EA).

  Read: **Getting Your Message to the Judge, SHC-1380** [Word](https://courts.alaska.gov/shc/family/docs/shc-1380.doc) | [PDF](https://courts.alaska.gov/shc/family/docs/shc-1380n.pdf).

  Learn about motions: See [Motions: Requesting an Order from the Court; Opposing a Motion](https://ak-courts.info/mot).

  % if type_of_response.all_true('default', exclusive = True) or (type_of_response['default'] and ((type_of_response['wrong state'] and ((user_need == 'answer custody' and jurisdiction) or user_need == 'answer divorce')) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) and not proper_service and stage_of_default in('application filed', 'hearing scheduled'):
  If ${ other_party_in_case } serves you properly in the future, the court may decide not to dismiss your case.   
  Read ${ answer_step.subject }.
  % endif
---
comment: |
  2026-04-24 adjusting for 'stay married' and added sure you don't want to respond question
  2026-04-16 some code is still a little different between docx and this mako step
