---
id: truefiling question 0 have complaint
comment: |
  only ask if not proper_service in Answer interviews
question: |
  Do you have a copy of the complaint?
yesno: have_complaint
---
id: truefiling questions 1 and 2 exempt and email
comment: |
  first true filing as long as proper_service is True or unasked in Answer interviews
question: |
  Is ${ other_party_in_case } exempt from using TrueFiling?
subquestion: |
  Look at the complaint.
  At the end, did ${ other_party_in_case } check the box to say they are exempt from using TrueFiling, the court’s electronic filing system? 
fields:
  - Did they check the 'exempt' box?: other_party_exempt
    input type: radio
    choices:
      - Yes: yes
      - No: no
      - "I don’t have the complaint right now.": none
  - Did ${ other_party_in_case } put their email in the complaint?: other_party_enter_email
    datatype: yesnomaybe
    show if: 
      variable: other_party_exempt
      is: yes
---
comment: |
  2026-03-25 CR building accordion step based on Google Sheet content from JS and CR meeting 2026-02-10
template: truefiling_file_and_serve_step
subject: |
  Step ${ truefiling_file_and_serve_idx }:
  % if user_need in('answer custody', 'answer divorce'):
  % if type_of_response.all_true('improper service', exclusive = True) or (type_of_response['improper service'] and not proper_service and ((user_need == 'answer custody' and type_of_response['wrong state'] and jurisdiction) or (user_need == 'answer divorce' and type_of_response['wrong state']) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) or ((type_of_response['default'] and stage_of_default in ('application filed', 'hearing scheduled') and proper_service) and ((user_need == 'answer custody' and type_of_response['wrong state'] and jurisdiction) or (user_need == 'answer divorce' and type_of_response['wrong state']) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) or (type_of_response.all_true('default', exclusive=True) and stage_of_default in ('application filed', 'hearing scheduled') and proper_service):
  If you decide to move forward, file
  % elif type_of_response['default'] and stage_of_default == 'judgment entered':
  If you are asking to set aside the default, file
  % else:
  File
  % endif
  and serve ${ other_party_in_case }
  % elif user_need in('custody', 'divorce'):
  File the original with your local court
  % elif user_need in('child support', 'change AK order', 'change foreign order','change divorce order', 'change custody order', 'change foreign custody order'):
  % if defined('file_step_heading'):
  ${ file_step_heading }
  % else:
  File
  % endif
  % elif user_need in('respond to motion in custody', 'respond to motion in divorce'):
  % if type_of_response == 'reconsider':
  If the judge asks you to respond to the Motion to Reconsider, file your response
  % else:
  File and serve your response within 10 or 13 days
  % endif
  % else:
  File your documents
  % endif
content: |
  After you finish filling out your forms:

    * You need to send them to the court. This is called “filing.” 
    * You also need to give ${ other_party_in_case } a copy of everything you file with the court. This is called “service.”  Read Step ${ truefiling_serve_idx }: ${ truefiling_serve_step.subject }.  
    *        Keep a copy for your records.

  % if user_need in('answer custody', 'answer divorce'):  
  **Timing**: You have 20 days after you receive the Complaint to file your documents with the court and give a copy to ${ other_party_in_case }.
  % elif user_need in('respond to motion in custody', 'respond to motion in divorce'):
  **Timing**: If ${ other_party_in_case } mailed a copy of the motion to you, you have 13 days to file and give a copy to ${ other_party_in_case }. Use the date of the postmark on the envelope.

  If they served you another way, you have 10 days to file  and give a copy to ${ other_party_in_case }.
  % endif

  % if user_need == 'divorce' and ((legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids == 'yes') or (not minor_children and agree_or_settle in('no prop debt or pregnancy','agree','do not know')))) or (legal_separation_or_divorce == 'legal separation' and agree_or_settle_kids == 'yes')):
  % if user_need == 'divorce' and (legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids == 'do not know') or (not minor_children and agree_or_settle == 'do not know'))):
   If
   % else:
   Because
   % endif
   both of you sign the forms and you each have a copy, you do not have to "serve" ${ other_party_in_case } by mailing documents or using a process server.
  % endif

  <div class = "step-subheading">Filing</div>
  
  The court has a system called TrueFiling that you need to use unless you are exempt. You are exempt if one of these applies:
  
    * You are in a jail or correctional facility.
    * You have a disability under the Americans with Disabilities Act (ADA).
    * You do not have safe access to a computer, internet, or email.
    * You cannot get the help you need to use TrueFiling.
    * You have a language barrier or are Limited English Proficient.

  You do not need to prove you are exempt.
  
  **If you are exempt and you choose not to use TrueFiling:**
  
    * Mark it on your form, or 
    * Fill out **[TF-820 Notice of Change to Use of Email or TrueFiling](https://public.courts.alaska.gov/web/forms/docs/tf-820.pdf)**. 
    * Take all your forms to the court, or mail them by first-class mail.
  % if user_need in('custody', 'divorce'):
     Use the [Court Directory](https://ak-courts.info/edir) to find court addresses.
  % endif
  
  **If you are not exempt:**
  
    * [Create an account](https://ak-courts.info/tflogin) and file your documents. Read about [TrueFiling](https://ak-courts.info/truefile)

  % if user_need in('custody', 'divorce','change AK order', 'change divorce order', 'change custody order', 'change foreign custody order'):
  % if user_need in('custody', 'divorce'):
  Pay the $250 filing fee to start your case.
  % elif user_need in('change AK order', 'change divorce order', 'change custody order', 'change foreign custody order'):
  ${ file_modify_filing_fee }
  % endif

  If you cannot afford the filing fee, you can ask the court to waive it:

    * Call the Family Law Self-Help Center<br>
      (907)264-0851, or<br>
      (866)279-0851,<br>
      or
    * Use Exemption From the Payment of Fees, TF-920 [[Fill-In PDF](https://ak-courts.info/tf920)].
  
  % if user_need in('custody', 'divorce'):
  <div class = "example">
  <p class = "heading">Note</p>
  Check with your local court to make sure you understand the procedure to follow after the court decides whether or not to grant your exemption.
  </div>

  After you pay the filing fee, or the court says you can file for free, the court clerk will give you 2 copies of:

    * a “Summons,” and
    * a “Standing Order” or “Domestic Relations Procedural Order.”  The Standing Order has important information about your case. Usually, the clerk will give you this order when you file.

    One copy is for you, the other copy is for ${ other_party_in_case }.

  % if user_need == 'divorce' and legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids in('yes', 'do not know')) or (not minor_children and agree_or_settle in('no prop debt or pregnancy', 'agree', 'do not know'))):
  <div class = "example">
  <p class = "heading">Note</p>
  If you file an uncontested complaint you may not get a Summons.
  </div>
  % endif
  % endif
  % endif
---
template: truefiling_serve_step
subject: |
  Step ${ truefiling_serve_idx }:
  % if user_need in('respond to motion in custody', 'respond to motion in divorce') and type_of_response == 'reconsider':
  If the judge asks you to respond to the Motion to Reconsider, serve ${ other_party_in_case }
  % else:
  Serve ${ other_party_in_case }
  % endif
content: |
  % if user_need in('custody', 'divorce'):
  % if legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids == 'do not know') or (not minor_children and agree_or_settle == 'do not know')):
  If you file an uncontested case and both of you sign the forms and each of you have a copy, you do not have to "serve" ${ other_party_in_case }.
  % endif
  <div class = "step-subheading">Regular service</div>
  You have to give ${ other_party_in_case } copies of everything you file with the court plus the **Summons** and the **Standing Order**. This is called “service.” There are special requirements about how to serve the forms that start the case on ${ other_party_in_case }. For future documents you file with the court, you can serve ${ other_party_in_case } through the Court’s TrueFiling platform.

  Choose how you want to serve the forms that start the case:
    * Certified Mail/Restricted Delivery/Return Receipt, or
    * Hiring a Process Server
  See [How do I serve the summons and complaint?](https://ak-courts.info/servecomplaint).
  % endif
  % if not user_need in ('custody', 'divorce', 'want po', 'have po', 'register po', 'po respondent'):
  You need to give ${ other_party_in_case } a copy of everything you file with the court. This is called “service.”
  
  Keep a copy for your records. 
  % endif

  % if user_need in('answer custody', 'answer divorce'):

  If you are using TrueFiling, read the information below about how to serve ${ other_party_in_case }
  
  If you are exempt and choose not to use TrueFiling, read [If I am not using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm#not-truefiling-serve) Add link after page fixed here: https://courts.alaska.gov/shc/family/serve.htm ]

  % if type_of_response.any_true('improper service', 'default') and not proper_service and not have_complaint:
  If you do not have a copy of the complaint, you may not know if the other person is using TrueFiling.
  % endif 
  % endif # answer custody or answer divorce

  % if not user_need in ('custody', 'divorce', 'want po', 'have po', 'register po', 'po respondent'):
  If you and the ${ other_party_in_case } are both using TrueFiling, you can serve them through TrueFiling. Read [If I am using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm#truefiling-serve)
  % endif

  % if user_need in('answer custody', 'answer divorce'):
  % if (type_of_response.any_true('improper service', 'default') and ((not proper_service and have_complaint) or proper_service)) or (type_of_response.all_false('improper service', 'default') and type_of_response.any_true('ak custody case', 'ak divorce case', 'wrong state', 'case in 2 states')):
  % if other_party_exempt == 'none' or (other_party_exempt == 'yes' and other_party_enter_email is None):
  Look at their complaint to see if they checked they were exempt. If not, they are using TrueFiling. Even if they checked they are exempt, look to see if they put their email anywhere on the complaint.  If they put an email, you can serve them through TrueFiling.  Read [Serving the Other Side](https://courts.alaska.gov/shc/family/serve.htm)
  % elif other_party_exempt == 'no':
  Use TrueFiling to serve ${ other_party_in_case }. Read [If I am using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm#truefiling-serve)
  % elif other_party_exempt == 'yes' and other_party_enter_email is False:
  Because the other person is not using TrueFiling and did not give an email address, you cannot serve them through TrueFiling.
  % endif
  % elif type_of_response.any_true('improper service', 'default') and not proper_service and not have_complaint:
  If they are not using TrueFiling:
  % endif
  % endif
  % if user_need in('child support', 'change AK order', 'change foreign order','change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce'):
  If you are not using TrueFiling, read [If I am not using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm#not-truefiling-serve)

  If the ${ other_party_in_case } is not using TrueFiling and did not give an email, you cannot serve them through TrueFiling.
  % endif

  % if user_need in ('answer custody', 'answer divorce') and (((type_of_response.any_true('improper service', 'default') and ((not proper_service and have_complaint) or proper_service)) or (type_of_response.all_false('improper service', 'default') and type_of_response.any_true('ak divorce case', 'wrong state', 'case in 2 states') and other_party_exempt == 'yes' and other_party_enter_email is False)) or (type_of_response.any_true('improper service', 'default') and not proper_service and not have_complaint )) or (user_need in('child support', 'change AK order', 'change foreign order','change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce')):
  1. Wait to file your document with the court until after you fill out the certificate of service and serve ${ other_party_in_case }.
  2. To serve ${ other_party_in_case }, send them a copy of all your documents by regular, 1st class mail, or hand-deliver it.
  3. Decide the date you will serve ${ other_party_in_case }. Try to serve ${ other_party_in_case } the same day you file your documents with the court.
  4. Fill out the Certificate of Service at the end of your court forms. The "certificate" tells the court how you are giving a copy of all the documents you file with the court to ${ other_party_in_case }. If the form does not have a Certificate of Service, use **Certificate of Service, TF-700** [[Fill-In PDF](https://ak-courts.info/tf700a)].
  5. File your documents with the court. Include a copy of the Certificate of Service.
  <div class = "example">
  <p class = "heading">If you do not fill out the Certificate of Service</p>
  <ul>
  % if user_need in('answer custody', 'answer divorce', 'respond to motion in custody', 'respond to motion in divorce'):
  <li>The court will send you a <strong>Deficiency Notice</strong>, and</li>
   <li>The judge may not get your paperwork.</li>
  % else:
  <li>The court may not accept your motion or may send you a <strong>Deficiency Notice</strong>, and</li>
  <li>The judge may not see your motion or make a decision.</li>
  % endif
  </ul>
  </div>
  % endif

  