template: truefiling_serve_step
subject: |
  Step ${ truefiling_serve_idx }:
  % if user_need in('respond to motion in custody', 'respond to motion in divorce') and type_of_response == 'reconsider':
  If the judge asks you to respond to the Motion for Reconsideration, serve ${ other_party_in_case }
  % else:
  Serve ${ other_party_in_case }
  % endif
content: |
  % if user_need in('custody', 'divorce'):
  % if user_need == 'custody' or ( user_need ==  'divorce' and legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids == 'do not know') or (not minor_children and agree_or_settle == 'do not know'))):
  If you file an uncontested case and both of you sign the forms and each of you have a copy, you do not have to "serve" ${ other_party_in_case }.
  % endif
  <div class = "step-subheading">Regular service</div>
  You have to give ${ other_party_in_case } copies of everything you file with the court plus the **Summons** and the **Standing Order**. This is called "service." There are special requirements about how to serve the forms that start the case on ${ other_party_in_case }. For future documents you file with the court, you can serve ${ other_party_in_case } through the Court's TrueFiling platform.
  Choose how you want to serve the forms that start the case:
    * Certified Mail/Restricted Delivery/Return Receipt, or
    * Hiring a Process Server
  See [How do I serve the summons and complaint?](https://ak-courts.info/servecomplaint).
  % endif
  
  % if user_need in('change foreign order', 'change foreign custody order'):
  The court will send a copy of your registration to ${ other_party_in_case }, but you must send a copy of your modification papers to ${ other_party_in_case }.
  To serve ${ other_party_in_case } a copy of your modification papers for a **child support order**, send a copy of the modification papers to the other party by regular first class mail.
  
  To serve ${ other_party_in_case } a copy of your modification papers for a **child custody order**, send a copy of the modification papers to ${ other_party_in_case } by:

    * certified mail, restricted delivery, return receipt; or
    * hiring a process server.

  To serve ${ other_party_in_case } a copy of your modification papers for both a **child support order** and a **child custody order**, send a copy of the modification papers to ${ other_party_in_case } by:

    * certified mail, restricted delivery, return receipt; or
    * hiring a process server
  % endif

  % if not user_need in('custody', 'divorce', 'want po', 'have po', 'register po', 'po respondent' 'change foreign order', 'change foreign custody order'):
  You need to give ${ other_party_in_case } a copy of everything you file with the court. This is called "service."
  Keep a copy for your records.
  % endif


  % if user_need in('answer custody', 'answer divorce'):
  If you are using TrueFiling, read the information below about how to serve ${ other_party_in_case }
  % endif

  % if user_need in ('answer custody', 'answer divorce') or (user_need in ('child support', 'change AK order', 'change foreign order', 'change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce') and filing_method in ('mail or in person', 'dunno')):
  If you are exempt and choose not to use TrueFiling, read [If I am not using TrueFiling, how do I serve the other side?](https://ak-courts.info/servecomplaint).
  % endif

  % if user_need in ('answer custody', 'answer divorce') or (user_need in ('child support', 'change AK order', 'change foreign order', 'change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce') and filing_method in ('efiling', 'dunno') and other_party_exempt in ('no', 'none')):
    If you and ${ other_party_in_case } are both using TrueFiling, ${ "you can serve them through TrueFiling" if user_need in ('answer custody', 'answer divorce') else "use TrueFiling to serve them" }. Read [If I am using TrueFiling, how do I serve the other side?](https://ak-courts.info/servecomplaint)
  % endif

  % if user_need in('answer custody', 'answer divorce') and type_of_response.any_true('improper service', 'default') and not proper_service and not have_complaint:
  If you do not have a copy of the complaint, you may not know if the other person is using TrueFiling.
  % endif

  % if user_need in('answer custody', 'answer divorce'):
  % if (type_of_response.any_true('improper service', 'default') and ((not proper_service and have_complaint) or proper_service)) or (type_of_response.all_false('improper service', 'default') and type_of_response.any_true('ak custody case', 'ak divorce case', 'wrong state', 'case in 2 states')):
  % if other_party_exempt == 'none' or (other_party_exempt == 'yes' and other_party_enter_email is None):
  Look at their complaint to see if they checked they were exempt. If not, they are using TrueFiling. Even if they checked they are exempt, look to see if they put their email anywhere on the complaint. If they put an email, you can serve them through TrueFiling. Read [Serving the Other Side](https://ak-courts.info/serve).
  % elif other_party_exempt == 'no':
  Use TrueFiling to serve ${ other_party_in_case }. Read [If I am using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm#truefiling-serve)
  % endif
  % elif type_of_response.any_true('improper service', 'default') and not proper_service and not have_complaint:
    If they are not using TrueFiling:
  % endif
  % endif

  % if ((user_need in ('answer custody', 'answer divorce') and ((type_of_response.any_true('improper service', 'default') and ((not proper_service and have_complaint) or proper_service)) or (type_of_response.all_false('improper service', 'default') and type_of_response.any_true('ak custody case', 'ak divorce case', 'wrong state', 'case in 2 states')))) or user_need in ('child support', 'change AK order', 'change foreign order', 'change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce')) and (other_party_exempt == 'yes' and other_party_enter_email):
  Use TrueFiling to serve ${ other_party_in_case }. Follow the TrueFiling instructions to serve them at their email address. Read [If I am not using TrueFiling, how do I serve the other side?](https://courts.alaska.gov/shc/family/serve.htm)
  % endif

  % if (user_need in ('answer custody', 'answer divorce') and ((type_of_response.any_true('improper service', 'default') and ((not proper_service and have_complaint) or proper_service)) or (type_of_response.all_false('improper service', 'default') and type_of_response.any_true('ak custody case', 'ak divorce case', 'wrong state', 'case in 2 states'))) and (other_party_exempt == 'yes' and other_party_enter_email is False)) or (user_need in ('child support', 'change AK order', 'change foreign order', 'change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce') and other_party_exempt == 'yes' and other_party_enter_email in (False, None)) :
  ${ "Because" if other_party_enter_email is False else "If" } ${ other_party_in_case } is not using TrueFiling and did not give an email address, you cannot serve them through TrueFiling.
  % endif

  % if (user_need in ('answer custody', 'answer divorce') and ((type_of_response.any_true('improper service', 'default') and not proper_service and not have_complaint) or (((type_of_response.any_true('improper service', 'default') and ((not proper_service and have_complaint) or proper_service)) or type_of_response.all_false('improper service', 'default')) and (other_party_exempt == 'yes' and other_party_enter_email in (False, None))))) or (user_need in ('child support', 'change AK order', 'change foreign order', 'change divorce order', 'change custody order', 'change foreign custody order', 'respond to motion in custody', 'respond to motion in divorce') and (other_party_exempt == 'yes' and other_party_enter_email in (False, None))):
  1. Wait to file your document with the court until after you fill out the certificate of service and serve ${ other_party_in_case }.
  2. To serve ${ other_party_in_case }, send them a copy of all your documents by regular, 1st class mail, or hand-deliver it.
  3. Decide the date you will serve ${ other_party_in_case }. Try to serve ${ other_party_in_case } the same day you file your documents with the court.
  4. Fill out the Certificate of Service at the end of your court forms. The "certificate" tells the court how you are giving a copy of all the documents you file with the court to ${ other_party_in_case }. If the form does not have a Certificate of Service, use **Certificate of Service, TF-700** [[Fill in PDF](https://ak-courts.info/tf700a)].
  5. File your documents with the court. Include a copy of the Certificate of Service.
  <div class = "example">
  <p class = "heading">If you do not fill out the Certificate of Service</p>
  <ul>
  % if user_need in('answer custody', 'answer divorce', 'respond to motion in custody', 'respond to motion in divorce'):
  <li>The court will send you a <strong>Deficiency Notice</strong>, and</li>
   <li>The judge may not get your paperwork.</li>
  % else:
  <li>The court may not accept your motion or may send you a <strong>Deficiency Notice</strong>, and</li>
  <li>The judge may not see your motion or make a decision.</li>
  % endif
  </ul>
  </div>
  % endif
---
