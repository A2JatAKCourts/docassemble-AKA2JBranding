template: truefiling_file_and_serve_step
subject: |
  Step ${ truefiling_file_and_serve_idx }:
  % if user_need in('answer custody', 'answer divorce') and type_of_response.any_true():
  % if type_of_response.all_true('improper service', exclusive = True) or (type_of_response['improper service'] and not proper_service and ((user_need == 'answer custody' and type_of_response['wrong state'] and jurisdiction) or (user_need == 'answer divorce' and type_of_response['wrong state']) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) or ((type_of_response['default'] and stage_of_default in ('application filed', 'hearing scheduled') and proper_service) and ((user_need == 'answer custody' and type_of_response['wrong state'] and jurisdiction) or (user_need == 'answer divorce' and type_of_response['wrong state']) or (type_of_response['case in 2 states'] and stage_of_other_case == 'ended with no order'))) or (type_of_response.all_true('default', exclusive=True) and stage_of_default in ('application filed', 'hearing scheduled') and proper_service):
  If you decide to move forward, file
  % elif type_of_response['default'] and stage_of_default == 'judgment entered':
  If you are asking to set aside the default, file
  % else:
  File
  % endif
  your documents with the court and serve ${ other_party_in_case }
  % elif user_need in('custody', 'divorce') or (user_need in('answer custody', 'answer divorce') and type_of_response.all_false()):
  File the original with your local court
  % elif user_need in('child support', 'change AK order', 'change foreign order','change divorce order', 'change custody order', 'change foreign custody order'):
  % if defined('file_step_heading'):
  ${ file_step_heading }
  % else:
  File
  % endif
  % elif user_need in('respond to motion in custody', 'respond to motion in divorce'):
  % if type_of_response == 'reconsider':
  If the judge asks you to respond to the Motion for Reconsideration, file your response
  % else:
  File and serve your response within 10 or 13 days
  % endif
  % else:
  File your documents
  % endif
content: |
  After you finish filling out your forms:

    * You need to send them to the court. This is called “filing.” 
  % if user_need in('answer custody', 'answer divorce') and type_of_response.all_false():
  Because both of you sign the forms and you each have a copy, you do not have to "serve" the other parent by mailing documents or using a process server.
  % else:
    * You also need to give ${ other_party_in_case } a copy of everything you file with the court. This is called “service.”  Read ${ truefiling_serve_step.subject }.  
    *        Keep a copy for your records.
  % endif

  % if user_need in('answer custody', 'answer divorce') and type_of_response.any_true():  
  **Timing**: You have 20 days after you receive the Complaint to file your documents with the court and give a copy to ${ other_party_in_case }.
  % elif user_need in('respond to motion in custody', 'respond to motion in divorce'):
  **Timing**: If ${ other_party_in_case } mailed a copy of the motion to you, you have 13 days to file and give a copy to ${ other_party_in_case }. Use the date of the postmark on the envelope.

  If they served you another way, you have 10 days to file  and give a copy to ${ other_party_in_case }.
  % endif

  % if user_need == 'divorce' and ((legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids == 'yes') or (not minor_children and agree_or_settle in('no prop debt or pregnancy','agree','do not know')))) or (legal_separation_or_divorce == 'legal separation' and agree_or_settle_kids == 'yes')):
  % if user_need == 'divorce' and (legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids == 'do not know') or (not minor_children and agree_or_settle == 'do not know'))):
   If
   % else:
   Because
   % endif
   both of you sign the forms and you each have a copy, you do not have to "serve" ${ other_party_in_case } by mailing documents or using a process server.
  % endif

  <div class = "step-subheading">Filing</div>
  
  The court has a system called TrueFiling that you need to use unless you are exempt. You are exempt if one of these applies:
  
    * You are in a jail or correctional facility.
    * You have a disability under the Americans with Disabilities Act (ADA).
    * You do not have safe access to a computer, internet, or email.
    * You cannot get the help you need to use TrueFiling.
    * You have a language barrier or are Limited English Proficient.

  You do not need to prove you are exempt.
  
  **If you are exempt and you choose not to use TrueFiling:**
  
    * Mark it on your form, or 
    * Fill out **TF-820 Notice of Change to Use of Email or TrueFiling** [[Fill in PDF](https://ak-courts.info/tf820)]. 
    * Take all your forms to the court, or mail them by first-class mail.
  % if user_need in('custody', 'divorce'):
     Use the [Court Directory](https://ak-courts.info/edir) to find court addresses.
  % endif
  
  **If you are not exempt:**
  
    * [Create an account](https://ak-courts.info/tflogin) and file your documents. Read about [TrueFiling](https://ak-courts.info/truefile)

  % if user_need in ('custody', 'divorce','change foreign custody order') or (user_need in ('change AK order', 'change custody order') and middle_of_case == 'no' and why_change in('review', 'schedule')) or (user_need =='change divorce order' and middle_of_case == 'no' and ((type_of_final_order['custody order'] and why_change in('review', 'schedule')) or (type_of_final_order['spousal support'] and why_change_divorce_order == 'changed circumstances'))):
  % if user_need in('custody', 'divorce'):
  Pay the $250 filing fee to start your case.
  % elif user_need in('change AK order', 'change divorce order', 'change custody order', 'change foreign custody order'):
  ${ file_modify_filing_fee }

  If you cannot afford the filing fee, you can ask the court to waive it:

    * Call the Family Law Self-Help Center<br>
      (907)264-0851, or<br>
      (866)279-0851,<br>
      or
    * Use Exemption From the Payment of Fees, TF-920 [[Fill in PDF](https://ak-courts.info/tf920)].
  
  <div class = "example">
  <p class = "heading">Note</p>
  Check with your local court to make sure you understand the procedure to follow after the court decides whether or not to grant your exemption.
  </div>

  % endif
  % if user_need in('custody', 'divorce'):
  After you pay the filing fee, or the court says you can file for free, the court clerk will give you 2 copies of:

    * a **Summons**, and
    * a ""Standing Order**.  The Standing Order has important information about your case. Usually, the clerk will give you this order when you file.

    One copy is for you, the other copy is for ${ other_party_in_case }.

  % if user_need == 'divorce' and legal_separation_or_divorce == 'divorce' and ((minor_children and agree_or_settle_kids in('yes', 'do not know')) or (not minor_children and agree_or_settle in('no prop debt or pregnancy', 'agree', 'do not know'))):
  <div class = "example">
  <p class = "heading">Note</p>
  If you file an uncontested complaint you may not get a **Summons**.
  </div>
  % endif
  % endif
  % endif
---
