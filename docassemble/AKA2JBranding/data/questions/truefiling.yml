template: sign_step
subject: |
  Step ${ sign_idx }: Sign if you use paper forms or do not use TrueFiling
content: |
  Signing your documents depends on:
  
    1.	If the signature needs to be notarized.
    2.	If you fill out a paper copy, by hand, or use a computer or mobile device.
    3.	If you file by mail, or hand deliver a paper copy to the court, or use TrueFiling.

  If you fill out your forms on a computer and file them with TrueFiling, you can sign your forms electronically.  Type “/s/ your name” on the signature line. For example, Zoe Lee’s  signature would be “/s/ Zoe Lee.”  If the form needs to be notarized, fill out and file **Self-Certification (No Notary Available), TF-835** [[Fill in PDF](https://ak-courts.info/tf835)].
  
  If you fill out your forms on a computer, but do not file them with TrueFiling, or you fill out paper copies by hand:

  * If your form does **not need** a notarized signature, sign it with a pen.
  * If your form **needs** a notarized signature, wait to sign the form until you are in front of someone who has the power to take oaths, like a notary public.  
      * If you file your documents in person, at court, the court clerk can notarize them for free.  Bring a valid photo ID with you.  
      * If you file by mailing your documents and you do not have access to a notary or court clerk, fill out and file **Self-Certification (No Notary Available), TF-835** [[Fill in PDF](https://ak-courts.info/tf835)].
---
